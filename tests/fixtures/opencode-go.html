<!doctype html>
<html lang="en">
  <body>
    <div data-slot="usage">
      <div data-slot="usage-item">
        <div data-slot="usage-header">
          <span data-slot="usage-label">Rolling Usage</span>
          <span data-slot="usage-value">0%</span>
        </div>
        <div data-slot="progress">
          <div data-slot="progress-bar" style="width: 0%"></div>
        </div>
        <span data-slot="reset-time">Resets in 5 hours 0 minutes</span>
      </div>
      <div data-slot="usage-item">
        <div data-slot="usage-header">
          <span data-slot="usage-label">Weekly Usage</span>
          <span data-slot="usage-value">0%</span>
        </div>
        <div data-slot="progress">
          <div data-slot="progress-bar" style="width: 0%"></div>
        </div>
        <span data-slot="reset-time">Resets in 3 days 8 hours 0 minutes</span>
      </div>
      <div data-slot="usage-item">
        <div data-slot="usage-header">
          <span data-slot="usage-label">Monthly Usage</span>
          <span data-slot="usage-value">100%</span>
        </div>
        <div data-slot="progress">
          <div data-slot="progress-bar" style="width: 100%"></div>
        </div>
        <span data-slot="reset-time">Resets in 15 days 22 hours 0 minutes</span>
      </div>
    </div>
  </body>
</html>
